name: Daily Blog Publisher

on:
  schedule:
    # Runs hourly; script checks timezone + target hour (default 8 AM ET).
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish now (true/false)"
        required: false
        default: "false"
      publish_mode:
        description: "published or draft"
        required: false
        default: "published"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      BLOG_TIMEZONE: ${{ vars.BLOG_TIMEZONE || 'America/New_York' }}
      BLOG_PUBLISH_HOUR_LOCAL: ${{ vars.BLOG_PUBLISH_HOUR_LOCAL || '8' }}
      REQUIRE_REVIEW: ${{ vars.REQUIRE_REVIEW || 'true' }}
      PUBLISH_MODE: ${{ github.event.inputs.publish_mode || vars.PUBLISH_MODE || 'published' }}
      FORCE_PUBLISH: ${{ github.event.inputs.force_publish || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-fund --no-audit

      - name: Generate daily post
        run: npm run generate:daily-post

      - name: Detect content changes
        id: changed
        run: |
          if [ -n "$(git status --porcelain content/blog)" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit directly when review is not required
        if: steps.changed.outputs.has_changes == 'true' && env.REQUIRE_REVIEW == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/blog
          git commit -m "chore(blog): publish daily post"
          git push

      - name: Create review PR when review is required
        if: steps.changed.outputs.has_changes == 'true' && env.REQUIRE_REVIEW != 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore(blog): generate daily post for review"
          title: "Daily Blog Draft - Review Before Publish"
          body: |
            This PR was generated by the scheduled daily blog workflow.
            - Timezone: `${{ env.BLOG_TIMEZONE }}`
            - Target hour: `${{ env.BLOG_PUBLISH_HOUR_LOCAL }}`
            - Mode: `${{ env.PUBLISH_MODE }}`

            Merge to publish the post.
          branch: automation/daily-blog
          delete-branch: true
          labels: |
            blog
            automation
          add-paths: |
            content/blog
